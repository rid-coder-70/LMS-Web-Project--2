<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Details - LMS</title>
  <link rel="stylesheet" href="css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="navbar-brand">🎓 LMS</a>
      <ul class="navbar-menu"></ul>
    </div>
  </nav>

  <!-- Course Details -->
  <section class="py-5">
    <div class="container">
      <div id="courseDetails">
        <!-- Course details will be loaded here -->
      </div>
    </div>
  </section>

  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const courseId = urlParams.get('id');
    const courseDetails = document.getElementById('courseDetails');

    if (!courseId) {
      window.location.href = 'courses.html';
    }

    async function loadCourseDetails() {
      showLoading(courseDetails);

      try {
        const course = await api.courses.getOne(courseId);

        courseDetails.innerHTML = `
          <div class="card" style="max-width: 900px; margin: 0 auto;">
            <div style="display: flex; gap: var(--spacing-sm); align-items: center; margin-bottom: var(--spacing-md);">
              <span class="badge badge-primary">${course.category}</span>
              <span style="color: var(--text-muted); font-size: 0.875rem;">⏱️ ${course.duration}</span>
              <span style="color: var(--text-muted); font-size: 0.875rem;">👥 ${course.enrollmentCount} enrolled</span>
            </div>

            <h1 class="mb-1">${course.title}</h1>
            
            <p style="color: var(--text-muted); margin-bottom: var(--spacing-lg);">
              Instructor: <strong>${course.instructor.name}</strong> (${course.instructor.email})
            </p>

            <div class="card-glass mb-3" style="padding: var(--spacing-lg);">
              <h3 style="font-size: 2rem; color: var(--primary); margin-bottom: var(--spacing-xs);">
                ${formatCurrency(course.price)}
              </h3>
              ${isAuthenticated() && getUser().role === 'learner' ? `
                <button onclick="enrollInCourse()" class="btn btn-primary" style="width: 100%;">
                  Enroll Now
                </button>
              ` : !isAuthenticated() ? `
                <a href="login.html" class="btn btn-primary" style="width: 100%; display: block;">
                  Login to Enroll
                </a>
              ` : ''}
            </div>

            <h3 class="mb-2">About This Course</h3>
            <p style="font-size: 1.125rem; line-height: 1.8;">${course.description}</p>

            <h3 class="mb-2 mt-3">Course Materials</h3>
            <p>${course.materials}</p>
          </div>
        `;
      } catch (error) {
        courseDetails.innerHTML = '<p class="text-center">Failed to load course details.</p>';
        console.error(error);
      }
    }

    async function enrollInCourse() {
      const user = getUser();

      // Show enrollment modal with secret number input
      const modal = document.createElement('div');
      modal.className = 'modal active';
      modal.innerHTML = `
        <div class="modal-content">
          <h3 class="mb-2">Confirm Enrollment</h3>
          <p class="mb-2">Enter your secret number to complete the payment.</p>
          
          <div class="form-group">
            <label class="form-label">Bank Secret Number</label>
            <input type="password" class="form-control" id="secretNumber" placeholder="Enter your PIN">
          </div>

          <div style="display: flex; gap: var(--spacing-sm); margin-top: var(--spacing-lg);">
            <button class="btn btn-outline" style="flex: 1;" onclick="this.closest('.modal').remove()">Cancel</button>
            <button class="btn btn-primary" style="flex: 1;" id="confirmEnrollment">Enroll & Pay</button>
          </div>
        </div>
      `;

      document.body.appendChild(modal);

      document.getElementById('confirmEnrollment').addEventListener('click', async () => {
        const secretNumber = document.getElementById('secretNumber').value;

        if (!secretNumber) {
          showToast('Please enter your secret number', 'warning');
          return;
        }

        try {
          const result = await api.enrollments.enroll({
            courseId: courseId,
            secretNumber: secretNumber,
          });

          if (result.enrollment) {
            modal.remove();
            showToast('Successfully enrolled! Redirecting to dashboard...', 'success');

            setTimeout(() => {
              window.location.href = 'learner-dashboard.html';
            }, 2000);
          } else {
            showToast(result.message || 'Enrollment failed', 'error');
          }
        } catch (error) {
          showToast('An error occurred. Please try again.', 'error');
          console.error(error);
        }
      });
    }

    loadCourseDetails();
  </script>
</body>

</html>
