<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learner Dashboard - LMS</title>
  <link rel="stylesheet" href="css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- jsPDF for certificate PDF generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>
  <div class="bg-glow"></div>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="navbar-brand">🎓 LMS Platform</a>
      <ul class="navbar-menu">
        <li><a href="courses.html" class="navbar-link">Explore Courses</a></li>
        <li><a href="learner-dashboard.html" class="navbar-link">Dashboard</a></li>
        <li><button onclick="logout()" class="btn btn-white-outline" style="padding: 0.5rem 1.25rem;">Logout</button>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Dashboard -->
  <section class="py-5">
    <div class="container">
      <div
        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-lg);">
        <div>
          <h1 id="welcomeText">Welcome back!</h1>
          <p id="balanceText" style="font-size: 1.125rem; color: var(--text-muted);"></p>
        </div>
        <a href="courses.html" class="btn btn-primary">Browse More Courses</a>
      </div>

      <!-- Stats Cards -->
      <div class="grid grid-3 mb-3">
        <div class="card card-glass text-center">
          <h3 id="enrolledCount" class="text-gradient">0</h3>
          <p>Enrolled Courses</p>
        </div>
        <div class="card card-glass text-center">
          <h3 id="completedCount" class="text-gradient">0</h3>
          <p>Completed</p>
        </div>
        <div class="card card-glass text-center">
          <h3 id="certificatesCount" class="text-gradient">0</h3>
          <p>Certificates</p>
        </div>
      </div>

      <!-- My Enrollments -->
      <div class="card mb-3">
        <h2 class="mb-2">My Courses</h2>
        <div id="enrollmentsList" class="grid grid-2">
          <!-- Enrollments will be loaded here -->
        </div>
      </div>

      <!-- Certificates -->
      <div class="card mb-3">
        <h2 class="mb-2">My Certificates</h2>
        <div id="certificatesList">
          <!-- Certificates will be loaded here -->
        </div>
      </div>

      <!-- Recent Transactions -->
      <div class="card">
        <h2 class="mb-2">Recent Transactions</h2>
        <div id="transactionsList">
          <!-- Transactions will be loaded here -->
        </div>
      </div>
    </div>
  </section>

  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script>
    protectPage();

    const user = getUser();

    if (!user || user.role !== 'learner') {
      window.location.href = 'index.html';
    }

    document.getElementById('welcomeText').textContent = `Welcome back, ${user.name}!`;

    async function loadDashboard() {
      // Load user info
      const userInfo = await api.auth.getMe();
      document.getElementById('balanceText').textContent = `Balance: ${formatCurrency(userInfo.balance)}`;

      // Load enrollments
      const enrollments = await api.enrollments.getMy();
      document.getElementById('enrolledCount').textContent = enrollments.length;
      document.getElementById('completedCount').textContent = enrollments.filter(e => e.completionStatus === 'completed').length;

      const enrollmentsList = document.getElementById('enrollmentsList');
      if (enrollments.length === 0) {
        enrollmentsList.innerHTML = '<p>No courses enrolled yet. <a href="courses.html">Browse courses</a></p>';
      } else {
        enrollmentsList.innerHTML = enrollments.map(enrollment => `
          <div class="card-glass" style="padding: var(--spacing-md);">
            <h4>${enrollment.course.title}</h4>
            <p style="font-size: 0.875rem; color: var(--text-muted);">
              Instructor: ${enrollment.course.instructor.name}
            </p>
            <div style="margin: var(--spacing-sm) 0;">
              ${enrollment.completionStatus === 'completed'
            ? '<span class="badge badge-success">Completed ✓</span>'
            : '<span class="badge badge-warning">In Progress</span>'}
            </div>
            ${enrollment.completionStatus !== 'completed' ? `
              <button onclick="completeCourse('${enrollment._id}')" class="btn btn-success" style="width: 100%; margin-top: var(--spacing-sm);">
                Mark as Complete
              </button>
            ` : ''}
            <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: var(--spacing-sm);">
              Enrolled: ${formatDate(enrollment.enrolledAt)}
            </p>
          </div>
        `).join('');
      }

      // Load certificates
      const certificates = await api.certificates.getMy();
      document.getElementById('certificatesCount').textContent = certificates.length;

      const certificatesList = document.getElementById('certificatesList');
      if (certificates.length === 0) {
        certificatesList.innerHTML = '<p>No certificates yet. Complete a course to earn one!</p>';
      } else {
        certificatesList.innerHTML = certificates.map(cert => `
          <div class="card-glass" style="padding: var(--spacing-md); margin-bottom: var(--spacing-sm); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: var(--spacing-sm);">
            <div>
              <h4>🏆 ${cert.course.title}</h4>
              <p style="font-size: 0.875rem; color: var(--text-muted);">
                Certificate ID: <strong>${cert.certificateId}</strong>
              </p>
              <p style="font-size: 0.875rem; color: var(--text-muted);">
                Issued: ${formatDate(cert.issuedAt)}
              </p>
            </div>
            <div style="display: flex; gap: var(--spacing-sm); align-items: center; flex-wrap: wrap;">
              <span class="badge badge-success">Certified ✓</span>
              <button
                onclick="downloadCertificate('${cert.certificateId}', '${cert.course.title}', '${formatDate(cert.issuedAt)}', '${cert.learner ? cert.learner.name : user.name}')"
                class="btn btn-primary"
                style="font-size: 0.875rem; padding: 0.4rem 1rem;"
              >📥 Download PDF</button>
            </div>
          </div>
        `).join('');
      }

      // Load transactions
      const transactions = await api.transactions.getMy();
      const transactionsList = document.getElementById('transactionsList');

      if (transactions.length === 0) {
        transactionsList.innerHTML = '<p>No transactions yet.</p>';
      } else {
        transactionsList.innerHTML = transactions.slice(0, 5).map(txn => `
          <div class="card-glass" style="padding: var(--spacing-md); margin-bottom: var(--spacing-sm); display: flex; justify-content: space-between; align-items: center;">
            <div>
              <h4 style="font-size: 1rem;">${txn.course.title}</h4>
              <p style="font-size: 0.875rem; color: var(--text-muted);">
                ${txn.transactionType} • ${formatDate(txn.createdAt)}
              </p>
            </div>
            <div style="text-align: right;">
              <div style="font-size: 1.25rem; font-weight: 700; color: ${txn.from._id === user._id ? 'var(--danger)' : 'var(--success)'};">
                ${txn.from._id === user._id ? '-' : '+'}${formatCurrency(txn.amount)}
              </div>
              <span class="badge badge-success">${txn.status}</span>
            </div>
          </div>
        `).join('');
      }
    }

    async function completeCourse(enrollmentId) {
      try {
        const result = await api.enrollments.complete(enrollmentId);

        if (result.certificate) {
          showToast('🎉 Congratulations! Certificate issued!', 'success');
          loadDashboard(); // Reload dashboard
        } else {
          showToast(result.message || 'Failed to complete course', 'error');
        }
      } catch (error) {
        showToast('An error occurred', 'error');
        console.error(error);
      }
    }

    function downloadCertificate(certId, courseTitle, issuedDate, learnerName) {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({
        orientation: 'landscape',
        unit: 'mm',
        format: 'a4',
      });

      const W = doc.internal.pageSize.getWidth();
      const H = doc.internal.pageSize.getHeight();

      // ── Background ──────────────────────────────────────────────
      doc.setFillColor(10, 10, 30);
      doc.rect(0, 0, W, H, 'F');

      // ── Outer gold border ────────────────────────────────────────
      doc.setDrawColor(212, 175, 55);
      doc.setLineWidth(3);
      doc.rect(8, 8, W - 16, H - 16);

      // ── Inner gold border ────────────────────────────────────────
      doc.setLineWidth(0.8);
      doc.rect(12, 12, W - 24, H - 24);

      // ── Purple gradient header band ──────────────────────────────
      doc.setFillColor(88, 28, 135);
      doc.rect(12, 12, W - 24, 38, 'F');

      // Header accent line
      doc.setDrawColor(212, 175, 55);
      doc.setLineWidth(1);
      doc.line(12, 50, W - 12, 50);

      // ── LMS brand in header ──────────────────────────────────────
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(22);
      doc.setFont('helvetica', 'bold');
      doc.text('[ LMS ]', W / 2, 28, { align: 'center' });

      doc.setFontSize(10);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(212, 175, 55);
      doc.text('LEARNING MANAGEMENT SYSTEM', W / 2, 38, { align: 'center' });

      // ── "CERTIFICATE OF COMPLETION" title ────────────────────────
      doc.setTextColor(212, 175, 55);
      doc.setFontSize(28);
      doc.setFont('helvetica', 'bold');
      doc.text('CERTIFICATE OF COMPLETION', W / 2, 72, { align: 'center' });

      // ── Decorative line under title ──────────────────────────────
      doc.setDrawColor(212, 175, 55);
      doc.setLineWidth(0.5);
      const lineW = 120;
      doc.line(W / 2 - lineW / 2, 76, W / 2 + lineW / 2, 76);

      // ── "This is to certify that" ────────────────────────────────
      doc.setTextColor(180, 180, 220);
      doc.setFontSize(12);
      doc.setFont('helvetica', 'italic');
      doc.text('This is to proudly certify that', W / 2, 92, { align: 'center' });

      // ── Learner name ─────────────────────────────────────────────
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(34);
      doc.setFont('helvetica', 'bold');
      doc.text(learnerName, W / 2, 110, { align: 'center' });

      // Underline
      const nameWidth = doc.getTextWidth(learnerName);
      doc.setDrawColor(212, 175, 55);
      doc.setLineWidth(0.6);
      doc.line(W / 2 - nameWidth / 2, 113, W / 2 + nameWidth / 2, 113);

      // ── "has successfully completed" ─────────────────────────────
      doc.setTextColor(180, 180, 220);
      doc.setFontSize(12);
      doc.setFont('helvetica', 'italic');
      doc.text('has successfully completed the course', W / 2, 126, { align: 'center' });

      // ── Course title ─────────────────────────────────────────────
      doc.setTextColor(212, 175, 55);
      doc.setFontSize(22);
      doc.setFont('helvetica', 'bold');
      doc.text(courseTitle, W / 2, 142, { align: 'center' });

      // ── Footer row: cert ID | trophy | date ──────────────────────
      // Left — Certificate ID
      doc.setTextColor(150, 150, 190);
      doc.setFontSize(9);
      doc.setFont('helvetica', 'normal');
      doc.text('Certificate ID', 35, 168);
      doc.setTextColor(212, 175, 55);
      doc.setFontSize(9);
      doc.setFont('helvetica', 'bold');
      doc.text(certId, 35, 174);

      // Center — 8-pointed star badge (no emoji, fully drawn)
      const bx = W / 2, by = 173;
      const outerR = 14, innerR = 6, points = 8;
      // Build 8-pointed star polygon
      const starPts = [];
      for (let i = 0; i < points * 2; i++) {
        const angle = (Math.PI / points) * i - Math.PI / 2;
        const r = i % 2 === 0 ? outerR : innerR;
        starPts.push([bx + r * Math.cos(angle), by + r * Math.sin(angle)]);
      }
      // Fill gold star
      doc.setFillColor(212, 175, 55);
      doc.setDrawColor(212, 175, 55);
      doc.setLineWidth(0.3);
      const firstPt = starPts.shift();
      doc.moveTo(firstPt[0], firstPt[1]);
      starPts.forEach(p => doc.lineTo(p[0], p[1]));
      // Draw filled star via lines
      doc.setFillColor(212, 175, 55);
      const allPts = [firstPt, ...starPts];
      const lineSegs = allPts.slice(1).map((p, i) => [p[0] - allPts[i][0], p[1] - allPts[i][1]]);
      doc.lines(lineSegs, firstPt[0], firstPt[1], [1, 1], 'FD', true);
      // Inner dark circle
      doc.setFillColor(10, 10, 30);
      doc.circle(bx, by, 5.5, 'F');
      // Gold ring inside
      doc.setDrawColor(212, 175, 55);
      doc.setLineWidth(0.8);
      doc.circle(bx, by, 4.5, 'S');
      // "LMS" text in badge center
      doc.setTextColor(212, 175, 55);
      doc.setFontSize(4.5);
      doc.setFont('helvetica', 'bold');
      doc.text('LMS', bx, by + 1.5, { align: 'center' });

      // Right — Issue date
      doc.setTextColor(150, 150, 190);
      doc.setFontSize(9);
      doc.setFont('helvetica', 'normal');
      doc.text('Date of Issue', W - 35, 168, { align: 'right' });
      doc.setTextColor(212, 175, 55);
      doc.setFont('helvetica', 'bold');
      doc.text(issuedDate, W - 35, 174, { align: 'right' });

      // ── Bottom tagline ────────────────────────────────────────────
      doc.setTextColor(80, 80, 120);
      doc.setFontSize(8);
      doc.setFont('helvetica', 'italic');
      doc.text('Issued by LMS | Learning Management System', W / 2, H - 16, { align: 'center' });

      // ── Save ──────────────────────────────────────────────────────
      const safeName = courseTitle.replace(/[^a-z0-9]/gi, '_');
      doc.save(`Certificate_${safeName}_${certId}.pdf`);

      showToast('📥 Certificate PDF downloaded!', 'success');
    }

    loadDashboard();
  </script>
</body>

</html>
