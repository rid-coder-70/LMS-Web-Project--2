<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LMS</title>
    <link rel="stylesheet" href="css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="navbar-brand">🎓 LMS</a>
            <ul class="navbar-menu">
                <li><a href="courses.html" class="navbar-link">Courses</a></li>
                <li><a href="register.html" class="navbar-link">Sign Up</a></li>
            </ul>
        </div>
    </nav>

    <!-- Login Form -->
    <section class="py-5">
        <div class="container" style="max-width: 500px;">
            <div class="card">
                <h2 class="text-center mb-3">Welcome Back</h2>

                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" required>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        Login
                    </button>
                </form>

                <p class="text-center mt-2">
                    Don't have an account? <a href="register.html">Sign up here</a>
                </p>

                <!-- Test Accounts Info -->
                <div class="card-glass mt-2" style="padding: var(--spacing-md);">
                    <h4 style="font-size: 0.875rem; margin-bottom: var(--spacing-xs);">Test Accounts:</h4>
                    <p style="font-size: 0.75rem; margin: 0;">
                        <strong>Learner:</strong> learner@test.com / learner123<br>
                        <strong>Instructor:</strong> john@instructor.com / instructor123
                    </p>
                </div>
            </div>
        </div>
    </section>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script>
        // Redirect if already logged in
        if (isAuthenticated()) {
            redirectDashboard();
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const data = await api.auth.login({ email, password });

                if (data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify({
                        _id: data._id,
                        name: data.name,
                        email: data.email,
                        role: data.role,
                        balance: data.balance,
                    }));

                    showToast('Login successful!', 'success');

                    setTimeout(() => {
                        redirectDashboard();
                    }, 1000);
                } else {
                    showToast(data.message || 'Login failed', 'error');
                }
            } catch (error) {
                showToast('An error occurred. Please try again.', 'error');
                console.error(error);
            }
        });
    </script>
</body>

</html>
