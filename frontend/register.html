<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - LMS</title>
    <link rel="stylesheet" href="css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="navbar-brand">🎓 LMS</a>
            <ul class="navbar-menu">
                <li><a href="courses.html" class="navbar-link">Courses</a></li>
                <li><a href="login.html" class="navbar-link">Login</a></li>
            </ul>
        </div>
    </nav>
    <section class="py-5">
        <div class="container" style="max-width: 600px;">
            <div class="card">
                <h2 class="text-center mb-3">Create Account</h2>

                <form id="registerForm">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="name" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" required minlength="6">
                        <small style="color: var(--text-muted);">At least 6 characters</small>
                    </div>

                    <div class="form-group">
                        <label class="form-label">I am a...</label>
                        <select class="form-control" id="role" required>
                            <option value="learner">Learner</option>
                            <option value="instructor">Instructor</option>
                        </select>
                    </div>
                    <div id="bankInfoSection" style="display: block;">
                        <h4 class="mt-2 mb-1" style="font-size: 1.125rem;">Bank Information</h4>
                        <p style="font-size: 0.875rem; color: var(--text-muted);">Required for course payments</p>

                        <div class="form-group">
                            <label class="form-label">Bank Account Number</label>
                            <input type="text" class="form-control" id="bankAccountNumber">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Secret Number (PIN)</label>
                            <input type="password" class="form-control" id="secretNumber">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        Create Account
                    </button>
                </form>

                <p class="text-center mt-2">
                    Already have an account? <a href="login.html">Login here</a>
                </p>
            </div>
        </div>
    </section>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script>
        // Redirect if already logged in
        if (isAuthenticated()) {
            redirectDashboard();
        }

        const roleSelect = document.getElementById('role');
        const bankInfoSection = document.getElementById('bankInfoSection');

        // Toggle bank info section based on role
        roleSelect.addEventListener('change', () => {
            if (roleSelect.value === 'instructor') {
                bankInfoSection.style.display = 'none';
            } else {
                bankInfoSection.style.display = 'block';
            }
        });

        // Set initial state on page load
        if (roleSelect.value === 'instructor') {
            bankInfoSection.style.display = 'none';
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;

            const data = {
                name,
                email,
                password,
                role,
            };

            // Add bank info if learner
            if (role === 'learner') {
                const bankAccountNumber = document.getElementById('bankAccountNumber').value;
                const secretNumber = document.getElementById('secretNumber').value;

                if (!bankAccountNumber || !secretNumber) {
                    showToast('Please fill in bank information', 'warning');
                    return;
                }

                data.bankAccountNumber = bankAccountNumber;
                data.secretNumber = secretNumber;
            }

            try {
                const response = await api.auth.register(data);

                if (response.token) {
                    localStorage.setItem('token', response.token);
                    localStorage.setItem('user', JSON.stringify({
                        _id: response._id,
                        name: response.name,
                        email: response.email,
                        role: response.role,
                    }));

                    showToast('Account created successfully!', 'success');

                    setTimeout(() => {
                        redirectDashboard();
                    }, 1000);
                } else {
                    showToast(response.message || 'Registration failed', 'error');
                }
            } catch (error) {
                showToast('An error occurred. Please try again.', 'error');
                console.error(error);
            }
        });
    </script>
</body>

</html>
